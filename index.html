// ─── Format helpers ───────────────────────────────────────────────────────────
function formatCurrency(amount, symbol = "₹") {
  return `${symbol}${Number(amount||0).toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:2})}`;
}
function formatDate(d) {
  if (!d) return "N/A";
  return new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
}
function daysOverdue(due) {
  return Math.floor((new Date()-new Date(due))/(1000*60*60*24));
}
function getStatusColor(s) {
  return ({paid:"bg-emerald-100 text-emerald-700 border-emerald-200",partial:"bg-amber-100 text-amber-700 border-amber-200",pending:"bg-blue-100 text-blue-700 border-blue-200",overdue:"bg-red-100 text-red-700 border-red-200",active:"bg-emerald-100 text-emerald-700 border-emerald-200",flagged:"bg-red-100 text-red-700 border-red-200",inactive:"bg-gray-100 text-gray-600 border-gray-200"})[s]||"bg-gray-100 text-gray-600";
}
function getPriorityColor(p) { return({high:"text-red-500",medium:"text-amber-500",low:"text-blue-500"})[p]||"text-gray-500"; }
function getNotificationIcon(t) { return({overdue:"⚠️",partial:"💰",paid:"✅",info:"ℹ️",new:"🆕"})[t]||"📢"; }
function generateId(p="id") { return `${p}-${Date.now()}-${Math.random().toString(36).substr(2,5)}`; }
function generateInvoiceId(invoices, prefix="INV", bizId) {
  const bizInvoices = invoices.filter(i=>i.businessId===bizId);
  const nums = bizInvoices.map(i=>{ const p=i.id.split("-"); return parseInt(p[p.length-1])||0; });
  return `${prefix}-${(Math.max(0,...nums)+1).toString().padStart(3,"0")}`;
}
function calculateTotals(items, discount=0) {
  const subtotal = items.reduce((s,i)=>s+(i.qty*i.rate),0);
  const taxAmount = items.reduce((s,i)=>s+(i.qty*i.rate*i.tax/100),0);
  return { subtotal, taxAmount, total: subtotal+taxAmount-discount };
}
function getAvatarColor(str) {
  const c=["bg-violet-500","bg-blue-500","bg-emerald-500","bg-amber-500","bg-rose-500","bg-indigo-500","bg-teal-500","bg-orange-500"];
  let h=0; for(let i=0;i<str.length;i++) h+=str.charCodeAt(i);
  return c[h%c.length];
}
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function getRevenueByMonth(invoices) {
  const data={},today=new Date();
  for(let i=5;i>=0;i--){const d=new Date(today.getFullYear(),today.getMonth()-i,1);data[`${MONTHS[d.getMonth()]} ${d.getFullYear()}`]={billed:0,collected:0};}
  invoices.forEach(inv=>{const d=new Date(inv.createdAt);const k=`${MONTHS[d.getMonth()]} ${d.getFullYear()}`;if(data[k]){data[k].billed+=inv.total;data[k].collected+=inv.paid;}});
  return data;
}

// Reminder helpers
function getWhatsAppMessage(customer, invoice, settings) {
  const balance=invoice.total-invoice.paid;
  return encodeURIComponent(`Hello ${customer.name},\n\nReminder from ${settings.name}.\n\nInvoice: ${invoice.id}\nAmount Due: ${formatCurrency(balance)}\nDue Date: ${formatDate(invoice.dueDate)}\n\nPayment via:\n• UPI: ${settings.upiId}\n• Bank: ${settings.bankName}, A/C: ${settings.accountNumber}\n\nThank you!\n${settings.name}`);
}
function getEmailDraft(customer, invoice, settings) {
  const balance=invoice.total-invoice.paid;
  return {
    to:customer.email,
    subject:`Payment Reminder - ${invoice.id} | ${settings.name}`,
    body:`Dear ${customer.name},\n\nOutstanding payment for invoice ${invoice.id}.\n\nTotal: ${formatCurrency(invoice.total)}\nPaid: ${formatCurrency(invoice.paid)}\nBalance: ${formatCurrency(balance)}\nDue: ${formatDate(invoice.dueDate)}\n\nBank: ${settings.bankName} | A/C: ${settings.accountNumber} | IFSC: ${settings.ifscCode}\nUPI: ${settings.upiId}\n\nThank you,\n${settings.name}\n${settings.phone}`
  };
}
function getSMSDraft(customer, invoice, settings) {
  return `Hi ${customer.name}, payment of ${formatCurrency(invoice.total-invoice.paid)} for ${invoice.id} due ${formatDate(invoice.dueDate)}. UPI: ${settings.upiId}. -${settings.name}`;
}

// ─── PDF INVOICE GENERATOR ────────────────────────────────────────────────────
function generateInvoicePDF(invoice, customer, business) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W=210, margin=15, cW=W-margin*2;

  // Header gradient bar
  doc.setFillColor(99,102,241);
  doc.rect(0,0,W,32,"F");

  // Business name
  doc.setTextColor(255,255,255);
  doc.setFontSize(22);
  doc.setFont("helvetica","bold");
  doc.text(business.name, margin, 14);

  // INVOICE label
  doc.setFontSize(12);
  doc.setFont("helvetica","normal");
  doc.text("TAX INVOICE", W-margin, 10, {align:"right"});
  doc.setFontSize(10);
  doc.text(`Invoice No: ${invoice.id}`, W-margin, 17, {align:"right"});
  doc.text(`Date: ${formatDate(invoice.createdAt)}`, W-margin, 23, {align:"right"});
  doc.text(`Due: ${formatDate(invoice.dueDate)}`, W-margin, 29, {align:"right"});

  // Business details block
  doc.setTextColor(60,60,60);
  doc.setFontSize(8);
  doc.setFont("helvetica","normal");
  let y=38;
  doc.text(business.address, margin, y); y+=4;
  doc.text(`Phone: ${business.phone}  |  Email: ${business.email}`, margin, y); y+=4;
  if(business.gstin) { doc.text(`GSTIN: ${business.gstin}`, margin, y); y+=4; }
  if(business.upiId) { doc.text(`UPI: ${business.upiId}`, margin, y); y+=4; }

  // Divider
  y+=2; doc.setDrawColor(200,200,220); doc.setLineWidth(0.3); doc.line(margin,y,W-margin,y); y+=5;

  // Bill To
  doc.setFillColor(245,245,252);
  doc.rect(margin,y,cW/2-4,22,"F");
  doc.setFontSize(7); doc.setTextColor(120,120,140); doc.text("BILL TO", margin+3, y+4);
  doc.setFontSize(10); doc.setFont("helvetica","bold"); doc.setTextColor(30,30,60);
  doc.text(customer.name, margin+3, y+9);
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(70,70,90);
  if(customer.businessName) { doc.text(customer.businessName, margin+3, y+14); }
  doc.text(customer.phone, margin+3, y+19);
  if(customer.email) { doc.text(customer.email, margin+3, y+24); }

  // Status badge
  const statusColors={paid:[16,185,129],partial:[245,158,11],pending:[59,130,246],overdue:[239,68,68]};
  const sc=statusColors[invoice.status]||[156,163,175];
  doc.setFillColor(...sc);
  doc.roundedRect(W-margin-35, y, 35, 10, 2, 2, "F");
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont("helvetica","bold");
  doc.text(invoice.status.toUpperCase(), W-margin-35+17.5, y+6.5, {align:"center"});

  y+=28;

  // Items table header
  doc.setFillColor(99,102,241);
  doc.rect(margin,y,cW,8,"F");
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont("helvetica","bold");
  const cols=[margin+2, margin+60, margin+80, margin+100, margin+120, margin+145];
  ["#","DESCRIPTION","QTY","RATE","TAX","AMOUNT"].forEach((h,i)=>doc.text(h,cols[i],y+5.5));
  y+=8;

  // Items rows
  invoice.items.forEach((item,idx)=>{
    const bg = idx%2===0?[249,248,255]:[255,255,255];
    doc.setFillColor(...bg); doc.rect(margin,y,cW,7,"F");
    doc.setTextColor(40,40,60); doc.setFont("helvetica","normal"); doc.setFontSize(8);
    const amt=item.qty*item.rate*(1+item.tax/100);
    doc.text(String(idx+1), cols[0], y+5);
    doc.text(String(item.name).slice(0,30), cols[1], y+5);
    doc.text(String(item.qty), cols[2], y+5);
    doc.text(`₹${item.rate.toLocaleString("en-IN")}`, cols[3], y+5);
    doc.text(`${item.tax}%`, cols[4], y+5);
    doc.text(`₹${amt.toLocaleString("en-IN",{maximumFractionDigits:0})}`, cols[5], y+5);
    y+=7;
  });

  // Totals block
  y+=4;
  doc.setDrawColor(200,200,220); doc.line(margin,y,W-margin,y); y+=4;

  const totals=[
    ["Subtotal", `₹${invoice.subtotal.toLocaleString("en-IN")}`],
    [`${business.taxLabel||"Tax"}`, `₹${invoice.taxAmount.toLocaleString("en-IN")}`],
  ];
  if(invoice.discount>0) totals.push(["Discount", `-₹${invoice.discount.toLocaleString("en-IN")}`]);
  totals.forEach(([k,v])=>{
    doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(80,80,100);
    doc.text(k, W-margin-55, y); doc.text(v, W-margin, y, {align:"right"});
    y+=5;
  });
  // Total
  doc.setFillColor(99,102,241); doc.rect(W-margin-65, y-1, 65, 8, "F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("TOTAL", W-margin-63, y+5); doc.text(`₹${invoice.total.toLocaleString("en-IN")}`, W-margin-2, y+5, {align:"right"});
  y+=10;

  // Paid / Balance
  if(invoice.paid>0){
    doc.setTextColor(16,185,129); doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.text(`Amount Paid: ₹${invoice.paid.toLocaleString("en-IN")}`, W-margin, y, {align:"right"}); y+=5;
  }
  const balance=invoice.total-invoice.paid;
  if(balance>0){
    doc.setTextColor(239,68,68); doc.setFontSize(10); doc.setFont("helvetica","bold");
    doc.text(`Balance Due: ₹${balance.toLocaleString("en-IN")}`, W-margin, y, {align:"right"}); y+=7;
  }

  // Payment history
  if(invoice.paymentHistory&&invoice.paymentHistory.length>0){
    y+=2; doc.setTextColor(60,60,80); doc.setFontSize(8); doc.setFont("helvetica","bold");
    doc.text("PAYMENT HISTORY", margin, y); y+=4;
    invoice.paymentHistory.forEach(p=>{
      doc.setFont("helvetica","normal"); doc.setTextColor(80,80,100);
      doc.text(`• ${formatDate(p.date)} — ${p.method}: ₹${p.amount.toLocaleString("en-IN")}${p.note?" ("+p.note+")":""}`, margin+2, y);
      y+=4;
    });
  }

  // Payment details box
  y+=4;
  doc.setFillColor(245,245,252); doc.rect(margin, y, cW, 22, "F");
  doc.setTextColor(100,100,130); doc.setFontSize(7); doc.setFont("helvetica","bold");
  doc.text("PAYMENT DETAILS", margin+3, y+5);
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(50,50,80);
  doc.text(`Bank: ${business.bankName}  |  A/C: ${business.accountNumber}  |  IFSC: ${business.ifscCode}`, margin+3, y+10);
  doc.text(`UPI: ${business.upiId}`, margin+3, y+16);
  if(invoice.notes){ doc.text(`Note: ${invoice.notes}`, margin+3, y+22); y+=6; }
  y+=26;

  // Footer
  doc.setDrawColor(200,200,220); doc.line(margin,y,W-margin,y); y+=4;
  doc.setTextColor(130,130,160); doc.setFontSize(8); doc.setFont("helvetica","normal");
  doc.text(business.invoiceFooter||"Thank you for your business!", W/2, y+4, {align:"center"}); y+=8;
  doc.setFontSize(7); doc.text(`Generated by BillPro · ${new Date().toLocaleString("en-IN")}`, W/2, y, {align:"center"});

  doc.save(`${invoice.id}.pdf`);
}

// ─── STATEMENT PDF GENERATOR ──────────────────────────────────────────────────
function generateStatementPDF(business, invoices, customers, fromDate, toDate) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W=210, margin=15, cW=W-margin*2;

  const filtered = invoices.filter(inv=>{
    const d=new Date(inv.createdAt);
    return d>=new Date(fromDate) && d<=new Date(toDate);
  });

  const totalBilled=filtered.reduce((s,i)=>s+i.total,0);
  const totalCollected=filtered.reduce((s,i)=>s+i.paid,0);
  const totalOutstanding=totalBilled-totalCollected;

  // Header
  doc.setFillColor(99,102,241); doc.rect(0,0,W,32,"F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold"); doc.setFontSize(20); doc.text(business.name, margin, 13);
  doc.setFontSize(11); doc.setFont("helvetica","normal"); doc.text("ACCOUNT STATEMENT", margin, 21);
  doc.setFontSize(9); doc.text(`Period: ${formatDate(fromDate)} — ${formatDate(toDate)}`, margin, 28);
  doc.setFontSize(9); doc.text(`Generated: ${new Date().toLocaleDateString("en-IN")}`, W-margin, 28, {align:"right"});

  let y=40;
  doc.setTextColor(60,60,80); doc.setFontSize(8);
  doc.text(`${business.address}  |  ${business.phone}  |  ${business.email}`, margin, y);
  y+=8;

  // Summary cards
  const cards=[
    {l:"Total Billed", v:`₹${totalBilled.toLocaleString("en-IN")}`, c:[99,102,241]},
    {l:"Collected", v:`₹${totalCollected.toLocaleString("en-IN")}`, c:[16,185,129]},
    {l:"Outstanding", v:`₹${totalOutstanding.toLocaleString("en-IN")}`, c:[239,68,68]},
    {l:"Invoices", v:String(filtered.length), c:[245,158,11]}
  ];
  cards.forEach((card,i)=>{
    const x=margin+i*(cW/4+1);
    doc.setFillColor(...card.c); doc.rect(x,y,cW/4-1,14,"F");
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont("helvetica","normal");
    doc.text(card.l, x+2, y+5);
    doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.text(card.v, x+2, y+12);
  });
  y+=20;

  // Table header
  doc.setFillColor(50,50,80); doc.rect(margin,y,cW,7,"F");
  doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont("helvetica","bold");
  const cols=[margin+1, margin+18, margin+60, margin+95, margin+115, margin+133, margin+151];
  ["#","Invoice","Customer","Date","Total","Paid","Balance","Status"].forEach((h,i,arr)=>{
    if(i<arr.length-1) doc.text(h,cols[i],y+5);
    else doc.text(h,W-margin-20,y+5);
  });
  y+=7;

  filtered.forEach((inv,idx)=>{
    if(y>265){ doc.addPage(); y=20; }
    const bg=idx%2===0?[248,248,255]:[255,255,255];
    doc.setFillColor(...bg); doc.rect(margin,y,cW,6,"F");
    doc.setTextColor(50,50,80); doc.setFont("helvetica","normal"); doc.setFontSize(7);
    const bal=inv.total-inv.paid;
    const cust=customers.find(c=>c.id===inv.customerId);
    doc.text(String(idx+1), cols[0], y+4.5);
    doc.text(inv.id, cols[1], y+4.5);
    doc.text((cust?.name||inv.customerName).slice(0,22), cols[2], y+4.5);
    doc.text(formatDate(inv.createdAt), cols[3], y+4.5);
    doc.text(`₹${inv.total.toLocaleString("en-IN")}`, cols[4], y+4.5);
    doc.text(`₹${inv.paid.toLocaleString("en-IN")}`, cols[5], y+4.5);
    doc.text(`₹${bal.toLocaleString("en-IN")}`, cols[6], y+4.5);
    const sc={paid:[16,185,129],partial:[245,158,11],pending:[59,130,246],overdue:[239,68,68]}[inv.status]||[150,150,150];
    doc.setTextColor(...sc); doc.setFont("helvetica","bold");
    doc.text(inv.status.toUpperCase(), W-margin-1, y+4.5, {align:"right"});
    doc.setTextColor(50,50,80); doc.setFont("helvetica","normal");
    y+=6;
  });

  if(filtered.length===0){
    doc.setTextColor(150,150,170); doc.setFontSize(10); doc.setFont("helvetica","normal");
    doc.text("No invoices found for this period.", W/2, y+10, {align:"center"});
  }

  // Totals summary
  y+=8;
  doc.setDrawColor(180,180,200); doc.line(margin,y,W-margin,y); y+=5;
  [["Total Billed",totalBilled],["Total Collected",totalCollected]].forEach(([l,v])=>{
    doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(80,80,100);
    doc.text(l, W-margin-50, y); doc.text(`₹${v.toLocaleString("en-IN")}`, W-margin, y, {align:"right"}); y+=5;
  });
  doc.setFillColor(99,102,241); doc.rect(W-margin-60,y-1,60,8,"F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("Balance Due", W-margin-58, y+5);
  doc.text(`₹${totalOutstanding.toLocaleString("en-IN")}`, W-margin-2, y+5, {align:"right"});
  y+=14;
  doc.setTextColor(130,130,160); doc.setFontSize(7);
  doc.text("This is a computer-generated statement. No signature required.", W/2, y, {align:"center"});

  doc.save(`Statement_${business.name}_${fromDate}_${toDate}.pdf`);
}

function Dashboard({ invoices, customers, users, currentUser, business, setPage, notifications }) {
  const isAdmin = currentUser.role==="admin";
  const myInvoices = isAdmin ? invoices : invoices.filter(i=>i.createdBy===currentUser.id);
  const myCustomers = isAdmin ? customers : customers.filter(c=>c.assignedTo===currentUser.id);

  const totalBilled = myInvoices.reduce((s,i)=>s+i.total,0);
  const totalCollected = myInvoices.reduce((s,i)=>s+i.paid,0);
  const totalPending = totalBilled-totalCollected;
  const overdueInvoices = myInvoices.filter(i=>i.status==="overdue");
  const pendingInvoices = myInvoices.filter(i=>["pending","partial"].includes(i.status));
  const unreadNotifs = notifications.filter(n=>!n.read);

  // Statement download state
  const [showStatement, setShowStatement] = React.useState(false);
  const [stFrom, setStFrom] = React.useState(new Date(new Date().setMonth(new Date().getMonth()-1)).toISOString().split("T")[0]);
  const [stTo, setStTo] = React.useState(new Date().toISOString().split("T")[0]);

  // Charts
  const barRef = React.useRef(null); const barInst = React.useRef(null);
  const donutRef = React.useRef(null); const donutInst = React.useRef(null);
  const revenueData = getRevenueByMonth(myInvoices);

  React.useEffect(()=>{
    if(barRef.current){
      if(barInst.current) barInst.current.destroy();
      barInst.current = new Chart(barRef.current.getContext("2d"),{
        type:"bar", data:{ labels:Object.keys(revenueData),
          datasets:[{label:"Billed",data:Object.values(revenueData).map(v=>v.billed),backgroundColor:"rgba(139,92,246,0.8)",borderRadius:8,borderSkipped:false},{label:"Collected",data:Object.values(revenueData).map(v=>v.collected),backgroundColor:"rgba(99,102,241,0.8)",borderRadius:8,borderSkipped:false}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"top"},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${formatCurrency(c.raw)}`}}},scales:{y:{beginAtZero:true,grid:{color:"rgba(0,0,0,0.05)"},ticks:{callback:v=>`₹${(v/1000).toFixed(0)}k`}},x:{grid:{display:false}}}}
      });
    }
    return ()=>{ if(barInst.current) barInst.current.destroy(); };
  },[invoices]);

  React.useEffect(()=>{
    if(donutRef.current){
      if(donutInst.current) donutInst.current.destroy();
      const sc={paid:0,partial:0,pending:0,overdue:0};
      myInvoices.forEach(i=>{if(sc[i.status]!==undefined)sc[i.status]++;});
      donutInst.current = new Chart(donutRef.current.getContext("2d"),{
        type:"doughnut", data:{labels:["Paid","Partial","Pending","Overdue"],datasets:[{data:Object.values(sc),backgroundColor:["#10b981","#f59e0b","#3b82f6","#ef4444"],borderWidth:0,hoverOffset:8}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:"70%",plugins:{legend:{position:"bottom"}}}
      });
    }
    return ()=>{ if(donutInst.current) donutInst.current.destroy(); };
  },[invoices]);

  const stats = [
    {label:"Total Billed",value:formatCurrency(totalBilled),icon:"🧾",color:"from-violet-500 to-indigo-600",sub:"+12% this month"},
    {label:"Collected",value:formatCurrency(totalCollected),icon:"✅",color:"from-emerald-500 to-teal-600",sub:`${myInvoices.filter(i=>i.status==="paid").length} paid`},
    {label:"Outstanding",value:formatCurrency(totalPending),icon:"⏳",color:"from-amber-500 to-orange-600",sub:`${pendingInvoices.length} invoices`},
    {label:"Overdue",value:formatCurrency(overdueInvoices.reduce((s,i)=>s+i.total-i.paid,0)),icon:"⚠️",color:"from-red-500 to-rose-600",sub:`${overdueInvoices.length} invoices`}
  ];

  return (
    <div className="flex-1 overflow-y-auto bg-gray-50 p-6 space-y-6">
      {/* Welcome */}
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-black text-gray-800">
            Good {new Date().getHours()<12?"Morning":new Date().getHours()<17?"Afternoon":"Evening"}, {currentUser.name.split(" ")[0]}! 👋
          </h1>
          <p className="text-gray-500 text-sm mt-0.5">{new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
        </div>
        <div className="flex gap-2 flex-wrap">
          {unreadNotifs.length>0&&(
            <div className="bg-red-50 border border-red-200 rounded-2xl px-4 py-2 flex items-center gap-2 cursor-pointer hover:bg-red-100 transition-colors" onClick={()=>setPage("notifications")}>
              <span className="text-red-500 text-lg">🔔</span><span className="text-red-700 text-sm font-semibold">{unreadNotifs.length} alerts</span>
            </div>
          )}
          {/* Statement Download — Admin only */}
          {isAdmin && (
            <button onClick={()=>setShowStatement(true)} className="flex items-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:opacity-90 shadow-sm">
              📥 Download Statement
            </button>
          )}
        </div>
      </div>

      {/* Stat cards */}
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
        {stats.map((s,i)=>(
          <div key={i} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
            <div className={`bg-gradient-to-r ${s.color} p-4 flex items-start justify-between`}>
              <div><p className="text-white/80 text-xs font-medium">{s.label}</p><p className="text-white text-2xl font-black mt-0.5">{s.value}</p></div>
              <span className="text-3xl opacity-80">{s.icon}</span>
            </div>
            <div className="px-4 py-2"><span className="text-gray-500 text-xs">{s.sub}</span></div>
          </div>
        ))}
      </div>

      {/* Charts */}
      <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
        <div className="xl:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <h3 className="text-gray-800 font-bold mb-4">Revenue Overview (Last 6 Months)</h3>
          <div style={{height:"240px"}}><canvas ref={barRef}></canvas></div>
        </div>
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <h3 className="text-gray-800 font-bold mb-4">Invoice Status</h3>
          <div style={{height:"240px"}}><canvas ref={donutRef}></canvas></div>
        </div>
      </div>

      {/* Bottom row */}
      <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100">
          <div className="flex items-center justify-between p-5 border-b border-gray-100">
            <h3 className="font-bold text-gray-800">Recent Invoices</h3>
            <button onClick={()=>setPage("invoices")} className="text-violet-600 text-sm font-semibold hover:text-violet-700">View All →</button>
          </div>
          <div className="divide-y divide-gray-50">
            {myInvoices.slice(0,5).map(inv=>(
              <div key={inv.id} className="flex items-center justify-between px-5 py-3 hover:bg-gray-50 transition-colors">
                <div><p className="text-sm font-semibold text-gray-800">{inv.id}</p><p className="text-xs text-gray-500">{inv.customerName} · {formatDate(inv.createdAt)}</p></div>
                <div className="text-right"><p className="text-sm font-bold text-gray-800">{formatCurrency(inv.total)}</p><span className={`text-xs px-2 py-0.5 rounded-full border font-medium ${getStatusColor(inv.status)}`}>{inv.status}</span></div>
              </div>
            ))}
            {myInvoices.length===0&&<div className="px-5 py-10 text-center text-gray-400 text-sm">No invoices yet</div>}
          </div>
        </div>
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100">
          <div className="flex items-center justify-between p-5 border-b border-gray-100">
            <h3 className="font-bold text-gray-800">⚠️ Pending Dues</h3>
            <button onClick={()=>setPage("customers")} className="text-violet-600 text-sm font-semibold hover:text-violet-700">View All →</button>
          </div>
          <div className="divide-y divide-gray-50">
            {myCustomers.map(c=>({...c,outstanding:(c.totalBilled||0)-(c.totalPaid||0)})).filter(c=>c.outstanding>0).sort((a,b)=>b.outstanding-a.outstanding).slice(0,5).map(c=>(
              <div key={c.id} className="flex items-center justify-between px-5 py-3 hover:bg-gray-50 transition-colors">
                <div className="flex items-center gap-3">
                  <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-xs font-bold text-white ${getAvatarColor(c.name)}`}>{c.name.charAt(0)}</div>
                  <div><p className="text-sm font-semibold text-gray-800">{c.name}</p><p className="text-xs text-gray-500">{c.businessName||c.phone}</p></div>
                </div>
                <div className="text-right"><p className="text-sm font-bold text-red-600">{formatCurrency(c.outstanding)}</p><p className="text-xs text-gray-400">outstanding</p></div>
              </div>
            ))}
            {myCustomers.filter(c=>(c.totalBilled||0)-(c.totalPaid||0)>0).length===0&&<div className="px-5 py-8 text-center text-gray-400 text-sm">🎉 All customers paid up!</div>}
          </div>
        </div>
      </div>

      {/* Quick stats */}
      {isAdmin && (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            {label:"Total Customers",value:customers.length,icon:"👥",color:"bg-blue-50 text-blue-700 border-blue-100"},
            {label:"Active Staff",value:users.filter(u=>u.role==="user"&&u.status==="active").length,icon:"👤",color:"bg-violet-50 text-violet-700 border-violet-100"},
            {label:"Total Invoices",value:invoices.length,icon:"🧾",color:"bg-emerald-50 text-emerald-700 border-emerald-100"},
            {label:"Overdue Alerts",value:overdueInvoices.length,icon:"⚠️",color:"bg-red-50 text-red-700 border-red-100"}
          ].map((s,i)=>(
            <div key={i} className={`rounded-2xl border p-4 ${s.color}`}>
              <div className="flex items-center gap-3"><span className="text-2xl">{s.icon}</span><div><p className="text-2xl font-black">{s.value}</p><p className="text-xs font-medium opacity-80">{s.label}</p></div></div>
            </div>
          ))}
        </div>
      )}

      {/* Statement Download Modal */}
      {showStatement && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl">
            <div className="flex items-center justify-between p-6 border-b border-gray-100">
              <h3 className="text-xl font-bold text-gray-800">📥 Download Statement</h3>
              <button onClick={()=>setShowStatement(false)} className="p-2 hover:bg-gray-100 rounded-xl text-gray-500">✕</button>
            </div>
            <div className="p-6 space-y-4">
              <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-3 text-sm text-emerald-700">
                📊 Generate a full invoice statement PDF for any date range.
              </div>
              <div>
                <label className="text-xs font-semibold text-gray-600 mb-1.5 block">From Date</label>
                <input type="date" value={stFrom} onChange={e=>setStFrom(e.target.value)} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-emerald-400" />
              </div>
              <div>
                <label className="text-xs font-semibold text-gray-600 mb-1.5 block">To Date</label>
                <input type="date" value={stTo} onChange={e=>setStTo(e.target.value)} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-emerald-400" />
              </div>
              <div className="bg-gray-50 rounded-xl p-3 text-sm text-gray-600">
                📋 {invoices.filter(i=>{ const d=new Date(i.createdAt); return d>=new Date(stFrom)&&d<=new Date(stTo); }).length} invoices in selected range
              </div>
            </div>
            <div className="flex gap-3 p-6 border-t border-gray-100">
              <button onClick={()=>setShowStatement(false)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200">Cancel</button>
              <button onClick={()=>{ generateStatementPDF(business, invoices, customers, stFrom, stTo); setShowStatement(false); }}
                className="flex-1 py-2.5 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-xl font-semibold hover:opacity-90">
                📥 Download PDF
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
function InvoicesPage({ invoices, setInvoices, customers, products, currentUser, business }) {
  const isAdmin = currentUser.role==="admin";
  const myInvoices = isAdmin ? invoices : invoices.filter(i=>i.createdBy===currentUser.id);
  const [search,setSearch]=React.useState("");
  const [statusFilter,setStatusFilter]=React.useState("all");
  const [showModal,setShowModal]=React.useState(false);
  const [showView,setShowView]=React.useState(false);
  const [showPayment,setShowPayment]=React.useState(false);
  const [showReminder,setShowReminder]=React.useState(false);
  const [sel,setSel]=React.useState(null);
  const [payAmount,setPayAmount]=React.useState("");
  const [payMethod,setPayMethod]=React.useState("UPI");
  const [payNote,setPayNote]=React.useState("");
  const [reminderType,setReminderType]=React.useState("whatsapp");
  const [form,setForm]=React.useState({customerId:"",items:[{id:generateId(),name:"",qty:1,rate:0,tax:business?.defaultTax||18}],discount:0,dueDate:"",notes:""});

  const filtered=myInvoices.filter(inv=>{
    const ms=inv.id.toLowerCase().includes(search.toLowerCase())||inv.customerName.toLowerCase().includes(search.toLowerCase());
    return ms&&(statusFilter==="all"||inv.status===statusFilter);
  });

  function addItem(){setForm(f=>({...f,items:[...f.items,{id:generateId(),name:"",qty:1,rate:0,tax:business?.defaultTax||18}]}));}
  function removeItem(id){setForm(f=>({...f,items:f.items.filter(i=>i.id!==id)}));}
  function updateItem(id,field,value){setForm(f=>({...f,items:f.items.map(i=>i.id===id?{...i,[field]:value}:i)}));}
  function loadProduct(itemId,pid){const p=products.find(p=>p.id===pid);if(p){updateItem(itemId,"name",p.name);updateItem(itemId,"rate",p.price);updateItem(itemId,"tax",p.tax);}}

  function createInvoice(){
    if(!form.customerId||form.items.some(i=>!i.name)) return alert("Fill all required fields.");
    const cust=customers.find(c=>c.id===form.customerId);
    const {subtotal,taxAmount,total}=calculateTotals(form.items,Number(form.discount));
    const newInv={
      id:generateInvoiceId(invoices,business?.invoicePrefix||"INV",currentUser.businessId),
      businessId:currentUser.businessId,
      customerId:form.customerId,customerName:cust.name,
      items:form.items,subtotal,taxAmount,discount:Number(form.discount),total,
      paid:0,status:"pending",dueDate:form.dueDate,
      createdAt:new Date().toISOString().split("T")[0],createdBy:currentUser.id,
      notes:form.notes,paymentHistory:[]
    };
    setInvoices(prev=>[newInv,...prev]);
    setShowModal(false);
    setForm({customerId:"",items:[{id:generateId(),name:"",qty:1,rate:0,tax:business?.defaultTax||18}],discount:0,dueDate:"",notes:""});
  }

  function recordPayment(){
    const amount=parseFloat(payAmount);
    if(!amount||amount<=0) return alert("Enter valid amount.");
    const balance=sel.total-sel.paid;
    if(amount>balance) return alert("Exceeds balance.");
    setInvoices(prev=>prev.map(inv=>{
      if(inv.id!==sel.id) return inv;
      const newPaid=inv.paid+amount;
      return {...inv,paid:newPaid,status:newPaid>=inv.total?"paid":"partial",paymentHistory:[...inv.paymentHistory,{amount,method:payMethod,date:new Date().toISOString().split("T")[0],note:payNote}]};
    }));
    setShowPayment(false);setPayAmount("");setPayNote("");
  }

  function deleteInvoice(id){if(!confirm("Delete invoice?")) return; setInvoices(prev=>prev.filter(i=>i.id!==id));}

  function handleDownloadPDF(inv){
    const cust=customers.find(c=>c.id===inv.customerId);
    if(!cust||!business) return alert("Customer or business data missing.");
    generateInvoicePDF(inv,cust,business);
  }

  const totals=calculateTotals(form.items,Number(form.discount));

  function getReminderContent(){
    if(!sel) return "";
    const cust=customers.find(c=>c.id===sel.customerId);
    if(!cust||!business) return "";
    if(reminderType==="whatsapp") return decodeURIComponent(getWhatsAppMessage(cust,sel,business));
    if(reminderType==="sms") return getSMSDraft(cust,sel,business);
    const d=getEmailDraft(cust,sel,business);
    return `To: ${d.to}\nSubject: ${d.subject}\n\n${d.body}`;
  }

  return (
    <div className="flex-1 overflow-y-auto bg-gray-50 p-6 space-y-5">
      {/* Header */}
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <div className="flex gap-2 flex-wrap">
          {["all","pending","partial","paid","overdue"].map(s=>(
            <button key={s} onClick={()=>setStatusFilter(s)} className={`px-3 py-1.5 rounded-xl text-xs font-semibold border capitalize transition-all ${statusFilter===s?"bg-violet-600 text-white border-violet-600":"bg-white text-gray-600 border-gray-200 hover:border-violet-300"}`}>
              {s==="all"?"All":s}
            </button>
          ))}
        </div>
        <div className="flex gap-2 items-center">
          <div className="relative"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." className="pl-9 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-violet-400 bg-white w-44"/>
          </div>
          <button onClick={()=>setShowModal(true)} className="flex items-center gap-1 bg-gradient-to-r from-violet-500 to-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:opacity-90 shadow-sm whitespace-nowrap">➕ New Invoice</button>
        </div>
      </div>

      {/* Summary */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {[{l:"Total",v:myInvoices.length,c:"text-gray-800"},{l:"Pending/Partial",v:myInvoices.filter(i=>["pending","partial"].includes(i.status)).length,c:"text-amber-600"},{l:"Paid",v:myInvoices.filter(i=>i.status==="paid").length,c:"text-emerald-600"},{l:"Overdue",v:myInvoices.filter(i=>i.status==="overdue").length,c:"text-red-600"}].map((s,i)=>(
          <div key={i} className="bg-white rounded-xl border border-gray-100 p-3 flex items-center gap-3"><span className={`text-2xl font-black ${s.c}`}>{s.v}</span><span className="text-xs text-gray-500">{s.l}</span></div>
        ))}
      </div>

      {/* Table */}
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr>{["Invoice #","Customer","Date","Due Date","Total","Paid","Balance","Status","Actions"].map(h=>(
                <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider whitespace-nowrap">{h}</th>
              ))}</tr>
            </thead>
            <tbody className="divide-y divide-gray-50">
              {filtered.length===0&&<tr><td colSpan={9} className="text-center py-12 text-gray-400">No invoices found</td></tr>}
              {filtered.map(inv=>{
                const balance=inv.total-inv.paid;
                const isOverdue=inv.status!=="paid"&&new Date(inv.dueDate)<new Date();
                return (
                  <tr key={inv.id} className="hover:bg-gray-50/80 transition-colors">
                    <td className="px-4 py-3"><span className="font-bold text-violet-700 cursor-pointer hover:underline" onClick={()=>{setSel(inv);setShowView(true);}}>{inv.id}</span></td>
                    <td className="px-4 py-3 font-medium text-gray-800">{inv.customerName}</td>
                    <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{formatDate(inv.createdAt)}</td>
                    <td className="px-4 py-3 whitespace-nowrap"><span className={isOverdue&&inv.status!=="paid"?"text-red-600 font-semibold":"text-gray-500"}>{formatDate(inv.dueDate)}{isOverdue&&inv.status!=="paid"&&" ⚠️"}</span></td>
                    <td className="px-4 py-3 font-semibold text-gray-800 whitespace-nowrap">{formatCurrency(inv.total)}</td>
                    <td className="px-4 py-3 text-emerald-600 font-medium whitespace-nowrap">{formatCurrency(inv.paid)}</td>
                    <td className="px-4 py-3 font-semibold whitespace-nowrap" style={{color:balance>0?"#dc2626":"#059669"}}>{formatCurrency(balance)}</td>
                    <td className="px-4 py-3"><span className={`px-2 py-1 rounded-lg text-xs font-semibold border capitalize ${getStatusColor(inv.status)}`}>{inv.status}</span></td>
                    <td className="px-4 py-3">
                      <div className="flex gap-1">
                        <button title="View" onClick={()=>{setSel(inv);setShowView(true);}} className="p-1.5 hover:bg-violet-100 rounded-lg text-violet-600 transition-colors">👁️</button>
                        <button title="Download PDF" onClick={()=>handleDownloadPDF(inv)} className="p-1.5 hover:bg-red-100 rounded-lg text-red-500 transition-colors">📄</button>
                        {inv.status!=="paid"&&<button title="Record Payment" onClick={()=>{setSel(inv);setShowPayment(true);}} className="p-1.5 hover:bg-emerald-100 rounded-lg text-emerald-600 transition-colors">💳</button>}
                        <button title="Send Reminder" onClick={()=>{setSel(inv);setShowReminder(true);}} className="p-1.5 hover:bg-amber-100 rounded-lg text-amber-600 transition-colors">🔔</button>
                        {isAdmin&&<button title="Delete" onClick={()=>deleteInvoice(inv.id)} className="p-1.5 hover:bg-red-100 rounded-lg text-red-500 transition-colors">🗑️</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* NEW INVOICE MODAL */}
      {showModal&&(
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 overflow-y-auto">
          <div className="bg-white rounded-2xl w-full max-w-4xl shadow-2xl my-4">
            <div className="flex items-center justify-between p-6 border-b border-gray-100">
              <h3 className="text-xl font-bold text-gray-800">➕ Create New Invoice</h3>
              <button onClick={()=>setShowModal(false)} className="p-2 hover:bg-gray-100 rounded-xl text-gray-500">✕</button>
            </div>
            <div className="p-6 space-y-5 max-h-[75vh] overflow-y-auto">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label className="text-sm font-semibold text-gray-700 mb-1.5 block">Customer *</label>
                  <select value={form.customerId} onChange={e=>setForm(f=>({...f,customerId:e.target.value}))} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-violet-400">
                    <option value="">Select Customer</option>
                    {customers.map(c=><option key={c.id} value={c.id}>{c.name}{c.businessName?` (${c.businessName})`:""}</option>)}
                  </select>
                </div>
                <div><label className="text-sm font-semibold text-gray-700 mb-1.5 block">Due Date *</label>
                  <input type="date" value={form.dueDate} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-violet-400"/>
                </div>
              </div>
              {/* Items */}
              <div>
                <div className="flex items-center justify-between mb-3">
                  <label className="text-sm font-semibold text-gray-700">Line Items *</label>
                  <button onClick={addItem} className="text-sm text-violet-600 font-semibold hover:text-violet-700">➕ Add Item</button>
                </div>
                <div className="space-y-2">
                  <div className="grid grid-cols-12 gap-2 text-xs font-semibold text-gray-500 uppercase tracking-wide px-1">
                    <div className="col-span-4">Item Name</div><div className="col-span-2">Quick Pick</div>
                    <div className="col-span-1">Qty</div><div className="col-span-2">Rate (₹)</div>
                    <div className="col-span-1">Tax%</div><div className="col-span-1">Amount</div><div className="col-span-1"></div>
                  </div>
                  {form.items.map(item=>(
                    <div key={item.id} className="grid grid-cols-12 gap-2 items-center bg-gray-50 p-2 rounded-xl">
                      <div className="col-span-4"><input value={item.name} onChange={e=>updateItem(item.id,"name",e.target.value)} placeholder="Description" className="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:border-violet-400 bg-white"/></div>
                      <div className="col-span-2"><select onChange={e=>loadProduct(item.id,e.target.value)} defaultValue="" className="w-full border border-gray-200 rounded-lg p-2 text-xs focus:outline-none focus:border-violet-400 bg-white"><option value="">Load…</option>{products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                      <div className="col-span-1"><input type="number" value={item.qty} onChange={e=>updateItem(item.id,"qty",parseFloat(e.target.value)||0)} min="0" className="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:border-violet-400 bg-white"/></div>
                      <div className="col-span-2"><input type="number" value={item.rate} onChange={e=>updateItem(item.id,"rate",parseFloat(e.target.value)||0)} min="0" className="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:border-violet-400 bg-white"/></div>
                      <div className="col-span-1"><input type="number" value={item.tax} onChange={e=>updateItem(item.id,"tax",parseFloat(e.target.value)||0)} min="0" max="100" className="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:border-violet-400 bg-white"/></div>
                      <div className="col-span-1 text-sm font-semibold text-gray-700">{formatCurrency(item.qty*item.rate)}</div>
                      <div className="col-span-1 flex justify-center">{form.items.length>1&&<button onClick={()=>removeItem(item.id)} className="text-red-400 hover:text-red-600">✕</button>}</div>
                    </div>
                  ))}
                </div>
              </div>
              {/* Totals */}
              <div className="flex gap-4 flex-col md:flex-row">
                <div className="flex-1"><label className="text-sm font-semibold text-gray-700 mb-1.5 block">Notes</label>
                  <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={3} placeholder="Notes…" className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-violet-400 resize-none"/>
                </div>
                <div className="bg-gray-50 rounded-xl p-4 min-w-52 space-y-2">
                  <div className="flex justify-between text-sm text-gray-600"><span>Subtotal</span><span className="font-medium">{formatCurrency(totals.subtotal)}</span></div>
                  <div className="flex justify-between text-sm text-gray-600"><span>Tax</span><span className="font-medium">{formatCurrency(totals.taxAmount)}</span></div>
                  <div className="flex justify-between text-sm text-gray-600"><span>Discount</span>
                    <input type="number" value={form.discount} onChange={e=>setForm(f=>({...f,discount:e.target.value}))} className="w-24 border border-gray-200 rounded-lg p-1 text-sm text-right focus:outline-none bg-white" placeholder="0"/>
                  </div>
                  <div className="flex justify-between font-bold text-gray-800 text-base border-t border-gray-200 pt-2 mt-2"><span>Total</span><span className="text-violet-700">{formatCurrency(totals.total)}</span></div>
                </div>
              </div>
            </div>
            <div className="flex justify-end gap-3 p-6 border-t border-gray-100">
              <button onClick={()=>setShowModal(false)} className="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200">Cancel</button>
              <button onClick={createInvoice} className="px-5 py-2.5 bg-gradient-to-r from-violet-500 to-indigo-600 text-white rounded-xl font-semibold hover:opacity-90">Create Invoice</button>
            </div>
          </div>
        </div>
      )}

      {/* VIEW MODAL */}
      {showView&&sel&&(
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl max-h-[90vh] flex flex-col">
            <div className="flex items-center justify-between p-6 border-b border-gray-100">
              <div><h3 className="text-xl font-bold text-gray-800">{sel.id}</h3><span className={`text-xs px-2 py-0.5 rounded-full border font-semibold ${getStatusColor(sel.status)}`}>{sel.status}</span></div>
              <button onClick={()=>setShowView(false)} className="p-2 hover:bg-gray-100 rounded-xl text-gray-500">✕</button>
            </div>
            <div className="flex-1 overflow-y-auto p-6 space-y-5">
              <div className="grid grid-cols-2 gap-4 bg-gray-50 rounded-xl p-4">
                {[["Customer",sel.customerName],["Invoice Date",formatDate(sel.createdAt)],["Due Date",formatDate(sel.dueDate)],["Balance Due",formatCurrency(sel.total-sel.paid)]].map(([l,v],i)=>(
                  <div key={i}><p className="text-xs text-gray-500">{l}</p><p className={`font-semibold ${l==="Balance Due"?"text-red-600 text-lg":""}`}>{v}</p></div>
                ))}
              </div>
              <div>
                <h4 className="font-semibold text-gray-700 mb-2">Line Items</h4>
                <table className="w-full text-sm"><thead className="bg-gray-50"><tr>{["Item","Qty","Rate","Tax","Amount"].map(h=><th key={h} className="text-left px-3 py-2 text-xs text-gray-500 font-semibold">{h}</th>)}</tr></thead>
                  <tbody>{sel.items.map((item,i)=><tr key={i} className="border-t border-gray-100"><td className="px-3 py-2">{item.name}</td><td className="px-3 py-2">{item.qty}</td><td className="px-3 py-2">{formatCurrency(item.rate)}</td><td className="px-3 py-2">{item.tax}%</td><td className="px-3 py-2 font-medium">{formatCurrency(item.qty*item.rate*(1+item.tax/100))}</td></tr>)}</tbody>
                </table>
                <div className="mt-2 bg-gray-50 rounded-xl p-3 space-y-1 text-sm">
                  <div className="flex justify-between text-gray-600"><span>Subtotal</span><span>{formatCurrency(sel.subtotal)}</span></div>
                  <div className="flex justify-between text-gray-600"><span>Tax</span><span>{formatCurrency(sel.taxAmount)}</span></div>
                  {sel.discount>0&&<div className="flex justify-between text-gray-600"><span>Discount</span><span>-{formatCurrency(sel.discount)}</span></div>}
                  <div className="flex justify-between font-bold text-gray-800 border-t border-gray-200 pt-1"><span>Total</span><span>{formatCurrency(sel.total)}</span></div>
                  <div className="flex justify-between text-emerald-600"><span>Paid</span><span>{formatCurrency(sel.paid)}</span></div>
                  <div className="flex justify-between font-bold text-red-600"><span>Balance</span><span>{formatCurrency(sel.total-sel.paid)}</span></div>
                </div>
              </div>
              {sel.paymentHistory.length>0&&(
                <div><h4 className="font-semibold text-gray-700 mb-2">Payment History</h4>
                  <div className="space-y-2">{sel.paymentHistory.map((p,i)=>(
                    <div key={i} className="flex items-center justify-between bg-emerald-50 border border-emerald-100 rounded-xl px-3 py-2">
                      <div><span className="text-sm font-medium text-emerald-700">{p.method}</span>{p.note&&<span className="text-xs text-gray-500 ml-2">— {p.note}</span>}</div>
                      <div className="text-right"><div className="font-bold text-emerald-700">{formatCurrency(p.amount)}</div><div className="text-xs text-gray-500">{formatDate(p.date)}</div></div>
                    </div>
                  ))}</div>
                </div>
              )}
              {sel.notes&&<div className="bg-blue-50 rounded-xl p-3"><p className="text-xs text-blue-500 font-semibold mb-1">NOTES</p><p className="text-sm text-blue-800">{sel.notes}</p></div>}
            </div>
            <div className="flex gap-2 p-4 border-t border-gray-100 flex-wrap">
              <button onClick={()=>handleDownloadPDF(sel)} className="flex-1 py-2.5 bg-gradient-to-r from-red-500 to-rose-600 text-white rounded-xl font-semibold text-sm hover:opacity-90">📄 Download PDF</button>
              {sel.status!=="paid"&&<button onClick={()=>{setShowView(false);setShowPayment(true);}} className="flex-1 py-2.5 bg-emerald-500 text-white rounded-xl font-semibold text-sm hover:bg-emerald-600">💳 Record Payment</button>}
              <button onClick={()=>{setShowView(false);setShowReminder(true);}} className="flex-1 py-2.5 bg-amber-500 text-white rounded-xl font-semibold text-sm hover:bg-amber-600">🔔 Reminder</button>
              <button onClick={()=>setShowView(false)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-semibold text-sm hover:bg-gray-200">Close</button>
            </div>
          </div>
        </div>
      )}

      {/* PAYMENT MODAL */}
      {showPayment&&sel&&(
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl">
            <div className="flex items-center justify-between p-6 border-b border-gray-100"><h3 className="text-xl font-bold">💳 Record Payment</h3><button onClick={()=>setShowPayment(false)} className="p-2 hover:bg-gray-100 rounded-xl text-gray-500">✕</button></div>
            <div className="p-6 space-y-4">
              <div className="bg-gray-50 rounded-xl p-4 space-y-1 text-sm">
                <div className="flex justify-between"><span className="text-gray-600">Invoice</span><span className="font-semibold">{sel.id}</span></div>
                <div className="flex justify-between"><span className="text-gray-600">Total</span><span className="font-semibold">{formatCurrency(sel.total)}</span></div>
                <div className="flex justify-between"><span className="text-gray-600">Paid</span><span className="font-semibold text-emerald-600">{formatCurrency(sel.paid)}</span></div>
                <div className="flex justify-between font-bold border-t border-gray-200 pt-1"><span>Balance Due</span><span className="text-red-600">{formatCurrency(sel.total-sel.paid)}</span></div>
              </div>
              <div><label className="text-sm font-semibold text-gray-700 mb-1.5 block">Payment Amount *</label>
                <input type="number" value={payAmount} onChange={e=>setPayAmount(e.target.value)} placeholder={`Max: ${formatCurrency(sel.total-sel.paid)}`} className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-violet-400"/>
                <button onClick={()=>setPayAmount(String(sel.total-sel.paid))} className="text-xs text-violet-600 font-semibold mt-1 hover:underline">Pay full balance</button>
              </div>
              <div><label className="text-sm font-semibold text-gray-700 mb-1.5 block">Payment Method</label>
                <div className="grid grid-cols-3 gap-2">{["Cash","UPI","Cheque","Card","Bank Transfer","Other"].map(m=>(
                  <button key={m} onClick={()=>setPayMethod(m)} className={`py-2 px-3 rounded-xl text-xs font-semibold border transition-all ${payMethod===m?"bg-violet-600 text-white border-violet-600":"bg-gray-50 text-gray-600 border-gray-200 hover:border-violet-300"}`}>{m}</button>
                ))}</div>
              </div>
              <div><label className="text-sm font-semibold text-gray-700 mb-1.5 block">Note</label>
                <input value={payNote} onChange={e=>setPayNote(e.target.value)} placeholder="Optional note…" className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:border-violet-400"/>
              </div>
            </div>
            <div className="flex gap-3 p-6 border-t border-gray-100">
              <button onClick={()=>setShowPayment(false)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200">Cancel</button>
              <button onClick={recordPayment} className="flex-1 py-2.5 bg-emerald-500 text-white rounded-xl font-semibold hover:bg-emerald-600">✅ Record</button>
            </div>
          </div>
        </div>
      )}

      {/* REMINDER MODAL */}
      {showReminder&&sel&&(
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl">
            <div className="flex items-center justify-between p-6 border-b border-gray-100"><h3 className="text-xl font-bold">🔔 Send Reminder</h3><button onClick={()=>setShowReminder(false)} className="p-2 hover:bg-gray-100 rounded-xl text-gray-500">✕</button></div>
            <div className="p-6 space-y-4">
              <div className="grid grid-cols-3 gap-2">
                {[{id:"whatsapp",icon:"📱",label:"WhatsApp"},{id:"email",icon:"📧",label:"Email"},{id:"sms",icon:"💬",label:"SMS"}].map(r=>(
                  <button key={r.id} onClick={()=>setReminderType(r.id)} className={`py-2.5 rounded-xl text-sm font-semibold border flex items-center justify-center gap-1.5 transition-all ${reminderType===r.id?"bg-violet-600 text-white border-violet-600":"bg-gray-50 text-gray-600 border-gray-200 hover:border-violet-300"}`}>{r.icon} {r.label}</button>
                ))}
              </div>
              <textarea readOnly value={getReminderContent()} rows={10} className="w-full border border-gray-200 rounded-xl p-3 text-xs font-mono bg-gray-50 focus:outline-none resize-none"/>
              <div className="flex gap-2">
                {reminderType==="whatsapp"&&(()=>{ const cust=customers.find(c=>c.id===sel.customerId); return cust&&business?(
                  <a href={`https://wa.me/${cust.phone.replace(/\D/g,"")}?text=${getWhatsAppMessage(cust,sel,business)}`} target="_blank" rel="noreferrer" className="flex-1 py-2.5 bg-green-500 text-white rounded-xl font-semibold text-sm text-center hover:bg-green-600">📱 Open WhatsApp</a>
                ):null; })()}
                <button onClick={()=>{navigator.clipboard.writeText(getReminderContent());alert("Copied!");}} className="flex-1 py-2.5 bg-violet-100 text-violet-700 rounded-xl font-semibold text-sm hover:bg-violet-200">📋 Copy</button>
              </div>
            </div>
            <div className="p-4 border-t border-gray-100 text-right"><button onClick={()=>setShowReminder(false)} className="px-5 py-2 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200 text-sm">Close</button></div>
          </div>
        </div>
      )}
    </div>
  );
}
function CustomersPage({ customers, setCustomers, invoices, users, currentUser }) {
  const isAdmin = currentUser.role==="admin";
  const myCustomers = isAdmin ? customers : customers.filter(c=>c.assignedTo===currentUser.id);
  const [search,setSearch]=React.useState("");
  const [statusFilter,setStatusFilter]=React.useState("all");
  const [showModal,setShowModal]=React.useState(false);
  const [showView,setShowView]=React.useState(false);
  const [editCustomer,setEditCustomer]=React.useState(null);
  const [selectedCustomer,setSelectedCustomer]=React.useState(null);
  const emptyForm={name:"",email:"",phone:"",address:"",gstin:"",businessName:"",creditLimit:"",assignedTo:"",status:"active",notes:""};
  const [form,setForm]=React.useState(emptyForm);

  const filtered=myCustomers.filter(c=>{
    const ms=c.name.toLowerCase().includes(search.toLowerCase())||c.email.toLowerCase().includes(search.toLowerCase())||c.phone.includes(search)||(c.businessName||"").toLowerCase().includes(search.toLowerCase());
    return ms&&(statusFilter==="all"||c.status===statusFilter);
  });

  function openAdd(){setEditCustomer(null);setForm(emptyForm);setShowModal(true);}
  function openEdit(c){setEditCustomer(c);setForm({...c,creditLimit:c.creditLimit||""});setShowModal(true);}

  function saveCustomer(){
    if(!form.name||!form.phone) return alert("Name and phone required.");
    if(editCustomer){
      setCustomers(prev=>prev.map(c=>c.id===editCustomer.id?{...c,...form,creditLimit:Number(form.creditLimit)||0}:c));
    } else {
      setCustomers(prev=>[{...form,id:generateId("c"),businessId:currentUser.businessId,creditLimit:Number(form.creditLimit)||0,totalBilled:0,totalPaid:0,createdAt:new Date().toISOString().split("T")[0]},...prev]);
    }
    setShowModal(false);
  }

  function deleteCustomer(id){if(!confirm("Delete customer?")) return; setCustomers(prev=>prev.filter(c=>c.id!==id));}
  function toggleFlag(id){setCustomers(prev=>prev.map(c=>c.id===id?{...c,status:c.status==="flagged"?"active":"flagged"}:c));}
  function viewCustomer(c){setSelectedCustomer(c);setShowView(true);}
  function getCInvoices(cid){return invoices.filter(i=>i.customerId===cid);}
  const staffUsers=users.filter(u=>u.role==="user"&&u.businessId===currentUser.businessId);

  return (
    <div className="flex-1 overflow-y-auto bg-gray-50 p-6 space-y-5">
      <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
        <div className="flex gap-2">
          {["all","active","flagged"].map(s=>(
            <button key={s} onClick={()=>setStatusFilter(s)} className={`px-3 py-1.5 rounded-xl text-xs font-semibold border capitalize transition-all ${statusFilter===s?"bg-violet-600 text-white border-violet-600":"bg-white text-gray-600 border-gray-200 hover:border-violet-300"}`}>
              {s==="all"?"All Customers":s}
            </button>
          ))}
        </div>
        <div className="flex gap-2 items-center">
          <div className="relative"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customers..." className="pl-9 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-violet-400 bg-white w-48"/>
          </div>
          {isAdmin&&<button onClick={openAdd} className="flex items-center gap-2 bg-gradient-to-r from-violet-500 to-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:opacity-90 shadow-sm whitespace-nowrap">➕ Add Customer</button>}
        </div>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {[{l:"Total",v:myCustomers.length,c:"text-gray-800"},{l:"Active",v:myCustomers.filter(c=>c.status==="active").length,c:"text-emerald-600"},{l:"Flagged",v:myCustomers.filter(c=>c.status==="flagged").length,c:"text-red-600"},{l:"Outstanding",v:formatCurrency(myCustomers.reduce((s,c)=>s+(c.totalBilled||0)-(c.totalPaid||0),0)),c:"text-amber-600"}].map((s,i)=>(
          <div key={i} className="bg-white rounded-xl border border-gray-100 p-3"><p className={`text-xl font-black ${s.c}`}>{s.v}</p><p className="text-xs text-gray-500">{s.l}</p></div>
        ))}
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {filtered.length===0&&<div className="col-span-3 text-center py-16 text-gray-400"><div className="text-5xl mb-3">👥</div><p>No customers found</p></div>}
        {filtered.map(c=>{
          const outstanding=(c.totalBilled||0)-(c.totalPaid||0);
          const assignedUser=users.find(u=>u.id===c.assignedTo);
          const cInvs=getCInvoices(c.id);
          return (
            <div key={c.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all overflow-hidden">
              <div className="p-5">
                <div className="flex items-start justify-between mb-3">
                  <div className="flex items-center gap-3">
                    <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-lg font-bold text-white ${getAvatarColor(c.name)}`}>{c.name.charAt(0)}</div>
                    <div><h3 className="font-bold text-gray-800">{c.name}</h3>{c.businessName&&<p className="text-xs text-gray-500">{c.businessName}</p>}</div>
                  </div>
                  <span className={`text-xs px-2 py-0.5 rounded-full border font-semibold ${getStatusColor(c.status)}`}>{c.status}</span>
                </div>
                <div className="space-y-1.5 text-sm text-gray-600 mb-4">
                  <div className="flex items-center gap-2"><span>📱</span><span>{c.phone}</span></div>
                  {c.email&&<div className="flex items-center gap-2"><span>📧</span><span className="truncate text-xs">{c.email}</span></div>}
                  {c.address&&<div className="flex items-center gap-2"><span>📍</span><span className="text-xs">{c.address}</span></div>}
                  {assignedUser&&<div className="flex items-center gap-2"><span>👤</span><span className="text-xs">Assigned: {assignedUser.name}</span></div>}
                </div>
                <div className="grid grid-cols-2 gap-2 mb-4">
                  <div className="bg-gray-50 rounded-xl p-2.5 text-center"><p className="text-xs text-gray-500">Total Billed</p><p className="font-bold text-gray-800">{formatCurrency(c.totalBilled||0)}</p></div>
                  <div className="bg-red-50 rounded-xl p-2.5 text-center"><p className="text-xs text-gray-500">Outstanding</p><p className={`font-bold ${outstanding>0?"text-red-600":"text-emerald-600"}`}>{formatCurrency(outstanding)}</p></div>
                </div>
                <div className="flex gap-1 flex-wrap mb-3">
                  {["paid","partial","pending","overdue"].map(s=>{const cnt=cInvs.filter(i=>i.status===s).length;return cnt?<span key={s} className={`text-xs px-2 py-0.5 rounded-full border ${getStatusColor(s)}`}>{cnt} {s}</span>:null;})}
                </div>
              </div>
              <div className="border-t border-gray-100 px-5 py-3 flex gap-2">
                <button onClick={()=>viewCustomer(c)} className="flex-1 text-xs font-semibold text-violet-600 hover:text-violet-700 py-1.5 hover:bg-violet-50 rounded-lg transition-colors">View</button>
                {isAdmin&&<button onClick={()=>openEdit(c)} className="flex-1 text-xs font-semibold text-gray-600 py-1.5 hover:bg-gray-50 rounded-lg transition-colors">✏️ Edit</button>}
                {isAdmin&&<button onClick={()=>toggleFlag(c.id)} className={`flex-1 text-xs font-semibold py-1.5 rounded-lg transition-colors ${c.status==="flagged"?"text-emerald-600 hover:bg-emerald-50":"text-amber-600 hover:bg-amber-50"}`}>{c.status==="flagged"?"✅ Unflag":"🚩 Flag"}</button>}
                {isAdmin&&<button onClick={()=>deleteCustomer(c.id)} className="text-xs font-semibold text-red-500 py-1.5 px-2 hover:bg-red-50 rounded-lg">🗑️</button>}
              </div>
            </div>
          );
        })}
      </div>

      {/* ADD/EDIT MODAL */}
      {showModal&&(
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl">
            <div className="flex items-center justify-between p-6 border-b border-gray-100"><h3 className="text-xl font-bold">{editCustomer?"✏️ Edit Customer":"➕ Add Customer"}</h3><button onClick={()=>setShowModal(false)} className="p-2 hover:bg-gray-100 rounded-xl text-gray-500">✕</button></div>
            <div className="p-6 space-y-3 max-h-[65vh] overflow-y-auto">
              {[{key:"name",label:"Full Name *",placeholder:"Customer name"},{key:"businessName",label:"Business Name",placeholder:"Company name"},{key:"phone",label:"Phone *",placeholder:"+91 98765 43210"},{key:"email",label:"Email",placeholder:"customer@email.com",type:"email"},{key:"address",label:"Address",placeholder:"Full address"},{key:"gstin",label:"GSTIN",placeholder:"Optional"},{key:"creditLimit",label:"Credit Limit (₹)",placeholder:"0",type:"number"},{key:"notes",label:"Notes",placeholder:"Any notes..."}].map(f=>(
                <div key={f.key}><label className="text-xs font-semibold text-gray-600 mb-1 block">{f.label}</label>
                  <input type={f.type||"text"} value={form[f.key]||""} onChange={e=>setForm(ff=>({...ff,[f.key]:e.target.value}))} placeholder={f.placeholder} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-violet-400"/>
                </div>
              ))}
              {isAdmin&&(
                <div><label className="text-xs font-semibold text-gray-600 mb-1 block">Assign To Staff</label>
                  <select value={form.assignedTo||""} onChange={e=>setForm(f=>({...f,assignedTo:e.target.value}))} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-violet-400">
                    <option value="">No assignment</option>
                    {staffUsers.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
                  </select>
                </div>
              )}
              <div><label className="text-xs font-semibold text-gray-600 mb-1 block">Status</label>
                <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-violet-400">
                  <option value="active">Active</option><option value="flagged">Flagged</option><option value="inactive">Inactive</option>
                </select>
              </div>
            </div>
            <div className="flex gap-3 p-6 border-t border-gray-100">
              <button onClick={()=>setShowModal(false)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200">Cancel</button>
              <button onClick={saveCustomer} className="flex-1 py-2.5 bg-gradient-to-r from-violet-500 to-indigo-600 text-white rounded-xl font-semibold hover:opacity-90">{editCustomer?"Save Changes":"Add Customer"}</button>
            </div>
          </div>
        </div>
      )}

      {/* VIEW MODAL */}
      {showView&&selectedCustomer&&(
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl w-full max-w-xl shadow-2xl max-h-[90vh] flex flex-col">
            <div className="flex items-center justify-between p-6 border-b border-gray-100">
              <div className="flex items-center gap-3">
                <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl font-bold text-white ${getAvatarColor(selectedCustomer.name)}`}>{selectedCustomer.name.charAt(0)}</div>
                <div><h3 className="text-xl font-bold text-gray-800">{selectedCustomer.name}</h3>{selectedCustomer.businessName&&<p className="text-sm text-gray-500">{selectedCustomer.businessName}</p>}</div>
              </div>
              <button onClick={()=>setShowView(false)} className="p-2 hover:bg-gray-100 rounded-xl text-gray-500">✕</button>
            </div>
            <div className="flex-1 overflow-y-auto p-6 space-y-4">
              <div className="grid grid-cols-2 gap-3">
                {[{l:"Phone",v:selectedCustomer.phone,i:"📱"},{l:"Email",v:selectedCustomer.email||"N/A",i:"📧"},{l:"GSTIN",v:selectedCustomer.gstin||"N/A",i:"📄"},{l:"Credit Limit",v:formatCurrency(selectedCustomer.creditLimit||0),i:"💳"},{l:"Since",v:formatDate(selectedCustomer.createdAt),i:"📅"},{l:"Status",v:selectedCustomer.status,i:"🔖"}].map((f,i)=>(

function UsersPage({ users, setUsers, currentUser }) {
  const [showModal,setShowModal]=React.useState(false);
  const [editUser,setEditUser]=React.useState(null);
  const [search,setSearch]=React.useState("");
  const emptyForm={name:"",email:"",password:"",phone:"",role:"user",status:"active"};
  const [form,setForm]=React.useState(emptyForm);
  const bizUsers=users.filter(u=>u.businessId===currentUser.businessId&&u.role!=="superadmin");
  const filtered=bizUsers.filter(u=>u.name.toLowerCase().includes(search.toLowerCase())||u.email.toLowerCase().includes(search.toLowerCase()));

  function openAdd(){setEditUser(null);setForm(emptyForm);setShowModal(true);}
  function openEdit(u){setEditUser(u);setForm({...u});setShowModal(true);}
  function save(){
    if(!form.name||!form.email) return alert("Name and email required.");
    if(!editUser&&!form.password) return alert("Password required.");
    if(editUser){setUsers(prev=>prev.map(u=>u.id===editUser.id?{...u,...form}:u));}
    else{setUsers(prev=>[...prev,{...form,id:generateId("u"),businessId:currentUser.businessId,avatar:form.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),createdAt:new Date().toISOString().split("T")[0],lastLogin:"Never"}]);}
    setShowModal(false);
  }
  function toggleStatus(id){if(id===currentUser.id) return; setUsers(prev=>prev.map(u=>u.id===id?{...u,status:u.status==="active"?"inactive":"active"}:u));}
  function deleteUser(id){if(id===currentUser.id) return; if(!confirm("Delete user?")) return; setUsers(prev=>prev.filter(u=>u.id!==id));}

  return (
    <div className="flex-1 overflow-y-auto bg-gray-50 p-6 space-y-5">
      <div className="flex items-center justify-between gap-3 flex-wrap">

        </div>
        <button onClick={openAdd} className="flex items-center gap-2 bg-gradient-to-r from-violet-500 to-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:opacity-90 shadow-sm">➕ Add Staff User</button>
      </div>
      <div className="grid grid-cols-3 gap-3">
        {[{l:"Total Staff",v:bizUsers.filter(u=>u.role!=="admin").length,c:"text-gray-800"},{l:"Active",v:bizUsers.filter(u=>u.status==="active").length,c:"text-emerald-600"},{l:"Inactive",v:bizUsers.filter(u=>u.status==="inactive").length,c:"text-red-600"}].map((s,i)=>(
          <div key={i} className="bg-white rounded-xl border border-gray-100 p-4"><p className={`text-2xl font-black ${s.c}`}>{s.v}</p><p className="text-xs text-gray-500">{s.l}</p></div>
        ))}
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {filtered.map(u=>(
          <div key={u.id} className={`bg-white rounded-2xl border shadow-sm hover:shadow-md transition-all overflow-hidden ${u.status==="inactive"?"opacity-60":"border-gray-100"} ${u.id===currentUser.id?"border-violet-200 ring-1 ring-violet-100":""}`}>
            <div className="p-5">
              <div className="flex items-start justify-between mb-4">
                <div className="flex items-center gap-3">
                  <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-lg font-bold text-white ${getAvatarColor(u.name)}`}>{u.avatar}</div>
                  <div>
                    <div className="flex items-center gap-1.5"><h3 className="font-bold text-gray-800">{u.name}</h3>{u.id===currentUser.id&&<span className="text-xs bg-violet-100 text-violet-600 px-1.5 py-0.5 rounded-md font-semibold">You</span>}</div>
                    <span className={`text-xs px-2 py-0.5 rounded-md font-semibold ${u.role==="admin"?"bg-violet-100 text-violet-600":"bg-blue-100 text-blue-600"}`}>{u.role==="admin"?"🛡️ Admin":"👤 Staff"}</span>
                  </div>
                </div>
                <span className={`text-xs px-2 py-0.5 rounded-full border font-semibold ${getStatusColor(u.status)}`}>{u.status}</span>
              </div>
              <div className="space-y-1.5 text-sm text-gray-600">
                <div className="flex gap-2"><span>📧</span><span className="truncate text-xs">{u.email}</span></div>
                <div className="flex gap-2"><span>📱</span><span className="text-xs">{u.phone}</span></div>
                <div className="flex gap-2"><span>📅</span><span className="text-xs">Joined: {formatDate(u.createdAt)}</span></div>
              </div>
            </div>
            <div className="border-t border-gray-100 px-5 py-3 flex gap-2">
              <button onClick={()=>openEdit(u)} className="flex-1 text-xs font-semibold text-violet-600 hover:text-violet-700 py-1.5 hover:bg-violet-50 rounded-lg">✏️ Edit</button>
              {u.id!==currentUser.id&&<button onClick={()=>toggleStatus(u.id)} className={`flex-1 text-xs font-semibold py-1.5 rounded-lg ${u.status==="active"?"text-amber-600 hover:bg-amber-50":"text-emerald-600 hover:bg-emerald-50"}`}>{u.status==="active"?"🔒 Deactivate":"✅ Activate"}</button>}
              {u.id!==currentUser.id&&u.role!=="admin"&&<button onClick={()=>deleteUser(u.id)} className="text-xs font-semibold text-red-500 py-1.5 px-2 hover:bg-red-50 rounded-lg">🗑️</button>}

            <div className="p-6 space-y-3">
              {[{key:"name",label:"Full Name *"},{key:"email",label:"Email *",type:"email"},{key:"password",label:editUser?"New Password (blank to keep)":"Password *",type:"password"},{key:"phone",label:"Phone"}].map(f=>(
                <div key={f.key}><label className="text-xs font-semibold text-gray-600 mb-1 block">{f.label}</label>
                  <input type={f.type||"text"} value={form[f.key]||""} onChange={e=>setForm(ff=>({...ff,[f.key]:e.target.value}))} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-violet-400"/></div>
              ))}
              <div><label className="text-xs font-semibold text-gray-600 mb-1 block">Role</label>
                <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-violet-400">
                  <option value="user">👤 Staff User</option><option value="admin">🛡️ Admin</option>
                </select>
              </div>
              <div><label className="text-xs font-semibold text-gray-600 mb-1 block">Status</label>
                <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} className="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-none focus:border-violet-400">
                  <option value="active">Active</option><option value="inactive">Inactive</option>
                </select>

            <div className="flex gap-3 p-6 border-t"><button onClick={()=>setShowModal(false)} className="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200">Cancel</button>
              <button onClick={save} className="flex-1 py-2.5 bg-gradient-to-r from-violet-500 to-indigo-600 text-white rounded-xl font-semibold hover:opacity-90">{editUser?"Save Changes":"Create User"}</button>
            </div>
          </div>
        </div>
      )}

  );
}
